name: Test Publicare Instagram (unic)

on:
  workflow_dispatch: {}

  jobs:
    test-publish:
        runs-on: ubuntu-latest
            steps:
                  - name: Checkout repo
                          uses: actions/checkout@v4

                                - name: Setup Python
                                        uses: actions/setup-python@v5
                                                with:
                                                          python-version: "3.11"

                                                                - name: Instaleaza dependentele
                                                                        run: pip install requests

                                                                              - name: Ruleaza testul de publicare
                                                                                      env:
                                                                                                IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
                                                                                                          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
                                                                                                                  working-directory: scripts
                                                                                                                          run: python test_publish.py
                                                                                                                          
